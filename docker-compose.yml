services:
  redis:
    container_name: unipilot-redis
    image: redis:latest
    restart: always
    volumes:
      - redis_data_v1:/data
    networks:
      - unipilot-net-v1

  backend:
    container_name: unipilot-backend
    build: ./UniPilot-Main/backend
    restart: always
    env_file:
      - ./UniPilot-Main/backend/.env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NODE_ENV: development
      PORT: 3000
      NODE_OPTIONS: "--dns-result-order=ipv4first"
    depends_on:
      - redis
    networks:
      - unipilot-net-v1

  main-frontend:
    container_name: unipilot-main-frontend
    build:
      context: ./UniPilot-Main/frontend
    restart: always
    networks:
      - unipilot-net-v1

  exam-frontend:
    container_name: unipilot-exam-frontend
    build:
      context: ./UniPilot-ExamManagement/frontend
    restart: always
    networks:
      - unipilot-net-v1

  nginx:
    container_name: unipilot-nginx
    image: nginx:latest
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - main-frontend
      - exam-frontend
    networks:
      - unipilot-net-v1

volumes:
  redis_data_v1:

networks:
  unipilot-net-v1:
    driver: bridge
